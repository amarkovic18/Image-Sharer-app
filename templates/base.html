<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}This is a default title {% endblock %}</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
     {% block style %}
     {% endblock %}
     </style>
</head>
<body>
    {% include "navbar.html" %}
     {% if messages %}
     {% for message in messages %}
     <div class="bg-gradient text-center text-white" style="background-color:rgb(119, 119, 245);" {% if message.tags %} class="{{message.tags}}"{% endif %}>
    {{message}}
     </div>
     {% endfor %}
     {% endif %}

    {% block body %}
    <div class="container">

    </div>
    {% endblock %}
    
</body>
</html>
